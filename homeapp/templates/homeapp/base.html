<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
</head>
<body>
    
    <nav>
        <a href="{% url 'home' %}">Início</a> |
        <a href="{% url 'cursos' %}">Cursos</a> |
        {% if user.is_authenticated %}
            <span>Olá, {{ user.username }}</span> |
            <form action="{% url 'sair' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; padding:0; font-family:inherit; font-size:inherit;">
                    Sair
                </button>
            </form>
        {% else %}
            <a href="{% url 'entrar' %}">Entrar</a>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
